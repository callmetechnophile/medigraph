services:
  - type: web
    name: healthcare-platform-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_BUCKET
        value: medigraph
      - key: CORS_ORIGINS
        value: '["https://your-frontend.com"]'
      - fromGroup: healthcare-platform-env




envVarGroups:
  - name: healthcare-platform-env
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        value: neo4j
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
