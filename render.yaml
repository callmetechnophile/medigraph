services:
  - type: web
    name: healthcare-platform-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        value: neo4j
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: medigraph
      - key: CORS_ORIGINS
        value: '["https://your-frontend.com"]'

  # --- Cron Jobs (Render Workflows) ---
  - type: cron
    name: daily-analytics
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 2 * * *"  # 2 AM daily
    startCommand: "python -m app.workflow.scheduler daily_analytics"
    envVars:
      - fromGroup: healthcare-platform-env

  - type: cron
    name: weekly-analytics
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 3 * * 1"  # 3 AM every Monday
    startCommand: "python -m app.workflow.scheduler weekly_analytics"
    envVars:
      - fromGroup: healthcare-platform-env

  - type: cron
    name: monthly-analytics
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 4 1 * *"  # 4 AM first day of month
    startCommand: "python -m app.workflow.scheduler monthly_analytics"
    envVars:
      - fromGroup: healthcare-platform-env

  - type: cron
    name: inventory-check
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 */6 * * *"  # Every 6 hours
    startCommand: "python -m app.workflow.scheduler inventory_restock_check"
    envVars:
      - fromGroup: healthcare-platform-env

  - type: cron
    name: attendance-escalation
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 10 * * *"  # 10 AM daily
    startCommand: "python -m app.workflow.scheduler attendance_escalation"
    envVars:
      - fromGroup: healthcare-platform-env

  - type: cron
    name: equipment-maintenance-check
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 6 * * *"  # 6 AM daily
    startCommand: "python -m app.workflow.scheduler equipment_maintenance_check"
    envVars:
      - fromGroup: healthcare-platform-env

envVarGroups:
  - name: healthcare-platform-env
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        value: neo4j
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
